name: Bust SW cache on deploy

on:
  push:
    branches: [main]

jobs:
  bust-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Bump SW cache version
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          sed -i "s/const CACHE_VERSION = 'bhapstar-[^']*'/const CACHE_VERSION = 'bhapstar-${COMMIT}'/" sw.js

      - name: Commit updated sw.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet && echo "No SW change needed." || (git commit -m "chore: bump SW cache version" && git push)
