name: Regenerate sitemap + structured data

# Runs whenever site-data.json changes on the main branch, plus a manual
# trigger from the Actions tab. Regenerates sitemap.xml AND the JSON-LD
# structured data in gallery.html / field_notes.html, committing all of
# it together in one commit (kept in the same job/workflow so the two
# generators can't race each other and push conflicting commits).
on:
  push:
    branches: [ main ]          # change to 'master' if that's your default branch
    paths:
      - 'site-data.json'
  workflow_dispatch:

permissions:
  contents: write

# Avoid this job racing with itself on rapid pushes
concurrency:
  group: regenerate-sitemap
  cancel-in-progress: false

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate sitemap.xml
        run: python generate-sitemap.py

      - name: Regenerate structured data (gallery.html, field_notes.html)
        run: python generate-schema.py

      - name: Commit if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet sitemap.xml gallery.html field_notes.html; then
            echo "Nothing changed — skipping commit."
          else
            git add sitemap.xml gallery.html field_notes.html
            git commit -m "Auto-regenerate sitemap + structured data from site-data.json"
            # bust-cache.yml also runs on every push and may push its own
            # commit first. Rebase onto whatever's now on main before
            # pushing, retrying a few times in case of further timing luck.
            success=0
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main && git push; then
                success=1
                break
              fi
              echo "Push attempt $i failed (likely lost a race with another workflow) — retrying in 5s..."
              sleep 5
            done
            if [ "$success" -ne 1 ]; then
              echo "Could not push after 5 attempts." >&2
              exit 1
            fi
          fi

