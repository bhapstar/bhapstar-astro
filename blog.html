<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blog — Bhapstar Astrophotography</title>
  <link rel="icon" href="images/icons/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="images/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#050414" />
  <link rel="canonical" href="https://bhapstar.com/blog.html" />
  <meta name="description" content="Astrophotography write-ups — nebulae, galaxies, star clusters and more. Imaging notes, equipment details and the stories behind each capture." />
  <meta property="og:type"         content="website" />
  <meta property="og:title"        content="Blog — Bhapstar Astrophotography" />
  <meta property="og:description"  content="Astrophotography write-ups — nebulae, galaxies, star clusters and more." />
  <meta property="og:image"        content="https://bhapstar.com/images/icons/og-preview.jpg" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url"          content="https://bhapstar.com/blog.html" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Blog — Bhapstar Astrophotography" />
  <meta name="twitter:description" content="Astrophotography write-ups — nebulae, galaxies, star clusters and more." />
  <meta name="twitter:image"       content="https://bhapstar.com/images/icons/og-preview.jpg" />
  <link rel="preconnect" href="https://static.cloudflareinsights.com" crossorigin />
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
    data-cf-beacon='{"token":"b3353c7dd8764a64baee57fd09c3dbb9"}'></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="/manifest.json" />

  <style>

    /* ══════════════════════════════════════
       BLOG INDEX
    ══════════════════════════════════════ */

    .blog-subhead {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 560px;
      margin-bottom: 36px;
    }

    /* Filter pills row */
    .blog-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }

    /* ── Featured post (first item, large) ── */
    .blog-featured {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-radius: var(--radius);
      border: 1px solid rgba(167,139,250,0.14);
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 16px;
      min-height: 340px;
      transition: border-color 240ms ease, box-shadow 240ms ease;
      background: rgba(167,139,250,0.03);
    }
    .blog-featured:hover {
      border-color: rgba(167,139,250,0.35);
      box-shadow: 0 28px 80px rgba(0,0,0,0.65), 0 0 50px rgba(167,139,250,0.10);
    }
    .blog-featured-img-wrap {
      overflow: hidden;
      position: relative;
    }
    .blog-featured-img-wrap::after {
      content: 'Featured';
      position: absolute;
      top: 16px; left: 16px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(167,139,250,0.22);
      border: 1px solid rgba(167,139,250,0.40);
      color: rgba(167,139,250,0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .blog-featured-img {
      width: 100%;
      height: 100%;
      min-height: 300px;
      object-fit: cover;
      display: block;
      filter: saturate(1.06) contrast(1.02);
      transition: transform 500ms var(--ease-out-expo), filter 300ms ease;
    }
    .blog-featured:hover .blog-featured-img {
      transform: scale(1.03);
      filter: saturate(1.14) contrast(1.05);
    }
    .blog-featured-body {
      padding: 36px 36px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-left: 1px solid rgba(167,139,250,0.10);
    }
    .blog-featured-type {
      font-size: 10.5px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(167,139,250,0.70);
      margin-bottom: 12px;
    }
    .blog-featured-title {
      font-size: clamp(18px, 2.5vw, 26px);
      font-weight: 700;
      line-height: 1.25;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #f472b6, #60a5fa, #a78bfa);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientRoll 5s linear infinite reverse;
      margin-bottom: 16px;
    }
    .blog-featured-intro {
      font-size: 13.5px;
      line-height: 1.7;
      color: rgba(200,195,235,0.70);
      margin-bottom: 28px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .blog-featured-read {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: rgba(167,139,250,0.80);
      transition: color 180ms ease, gap 180ms ease;
    }
    .blog-featured:hover .blog-featured-read { color: #a78bfa; gap: 11px; }
    .blog-featured-date {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid rgba(167,139,250,0.10);
      font-size: 11px;
      color: rgba(200,195,235,0.32);
      letter-spacing: 0.05em;
    }

    /* ── Post list (remaining items) ── */
    .blog-list {
      display: flex;
      flex-direction: column;
    }
    .blog-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
      border: 1px solid rgba(167,139,250,0.08);
      border-bottom: none;
      overflow: hidden;
      cursor: pointer;
      min-height: 130px;
      transition: border-color 220ms ease, box-shadow 220ms ease,
                  background 220ms ease, transform 220ms var(--ease-spring);
      background: rgba(167,139,250,0.02);
    }
    .blog-row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
    .blog-row:last-child  { border-bottom: 1px solid rgba(167,139,250,0.08); border-radius: 0 0 var(--radius) var(--radius); }
    .blog-row:only-child  { border-radius: var(--radius); border-bottom: 1px solid rgba(167,139,250,0.08); }
    .blog-row:hover {
      border-color: rgba(167,139,250,0.26);
      background: rgba(167,139,250,0.04);
      box-shadow: 0 8px 32px rgba(0,0,0,0.40), 0 0 20px rgba(167,139,250,0.06);
      transform: translateX(4px);
      z-index: 1;
      position: relative;
    }
    .blog-row-img-wrap { overflow: hidden; }
    .blog-row-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      filter: saturate(1.04) contrast(1.02);
      transition: transform 400ms var(--ease-out-expo), filter 240ms ease;
    }
    .blog-row:hover .blog-row-img { transform: scale(1.06); filter: saturate(1.12) contrast(1.04); }
    .blog-row-body {
      padding: 18px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-left: 1px solid rgba(167,139,250,0.07);
    }
    .blog-row-type {
      font-size: 10px; letter-spacing: 0.20em; text-transform: uppercase;
      color: rgba(167,139,250,0.60); margin-bottom: 6px;
    }
    .blog-row-title {
      font-size: 15px; font-weight: 700; line-height: 1.3;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    .blog-row-intro {
      font-size: 12.5px; line-height: 1.6; color: rgba(200,195,235,0.58); flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .blog-row-meta { margin-top: 10px; font-size: 11px; color: rgba(200,195,235,0.28); letter-spacing: 0.04em; }

    /* Skeleton loaders */
    .blog-skel-featured {
      border-radius: var(--radius);
      background: rgba(167,139,250,0.04);
      border: 1px solid rgba(167,139,250,0.07);
      height: 340px; margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .blog-skel-row {
      height: 130px;
      background: rgba(167,139,250,0.03);
      border: 1px solid rgba(167,139,250,0.06);
      border-bottom: none;
      position: relative; overflow: hidden;
    }
    .blog-skel-row:first-of-type { border-radius: var(--radius) var(--radius) 0 0; }
    .blog-skel-row:last-of-type  { border-bottom: 1px solid rgba(167,139,250,0.06); border-radius: 0 0 var(--radius) var(--radius); }
    .blog-skel-featured::after, .blog-skel-row::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 30%, rgba(167,139,250,0.05) 50%, transparent 70%);
      background-size: 200% 100%; animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer { from { background-position: 200% 0 } to { background-position: -200% 0 } }
    .blog-empty { padding: 40px 0; color: var(--muted); font-size: 14px; }


    /* ══════════════════════════════════════
       FULL POST VIEW
    ══════════════════════════════════════ */

    #postView {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      transform: translateY(100%);
      transition: transform 380ms cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(167,139,250,0.16) transparent;
    }
    #postView.open { transform: translateY(0); }

    /* Full-width banner */
    .post-banner {
      width: 100%; height: 55vh;
      min-height: 280px; max-height: 520px;
      position: relative; overflow: hidden;
    }
    .post-banner-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      filter: saturate(1.08) contrast(1.03);
    }
    .post-banner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(5,4,20,0.08) 0%,
        rgba(5,4,20,0.0)  35%,
        rgba(5,4,20,0.65) 78%,
        rgba(5,4,20,1.0)  100%
      );
    }

    /* Back button floats over banner */
    .post-back {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.85);
      background: rgba(5,4,20,0.52);
      border: 1px solid rgba(167,139,250,0.28);
      border-radius: 999px; padding: 0 14px 0 10px; height: 38px;
      cursor: pointer;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
      letter-spacing: 0.03em;
    }
    .post-back:hover {
      background: rgba(167,139,250,0.20);
      border-color: rgba(167,139,250,0.55);
      color: #fff;
    }

    /* Title overlaid on bottom of banner */
    .post-banner-text {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 5;
      padding: 32px 40px 36px;
    }
    .post-type-label {
      font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(167,139,250,0.85); margin-bottom: 10px;
    }
    .post-title {
      font-size: clamp(22px, 4vw, 38px); font-weight: 700; line-height: 1.15;
      color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.6); margin: 0;
    }

    /* Article body */
    .post-article {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 28px 80px;
    }

    /* Pull-quote intro */
    .post-intro {
      font-size: 17px; line-height: 1.75;
      color: rgba(200,195,235,0.92);
      margin-bottom: 36px; padding-bottom: 32px;
      border-bottom: 1px solid rgba(167,139,250,0.14);
      font-style: italic;
      position: relative; padding-left: 20px;
    }
    .post-intro::before {
      content: ''; position: absolute;
      left: 0; top: 4px; bottom: 4px; width: 3px; border-radius: 2px;
      background: linear-gradient(to bottom, #a78bfa, #60a5fa, #f472b6);
    }

    /* Body */
    .post-body { font-size: 14.5px; line-height: 1.90; color: rgba(200,195,235,0.78); }
    .post-body p { margin-bottom: 22px; }
    .post-body .update-note {
      background: rgba(96,165,250,0.06);
      border: 1px solid rgba(96,165,250,0.20);
      border-left: 3px solid rgba(96,165,250,0.50);
      border-radius: 10px; padding: 16px 20px;
      color: rgba(96,165,250,0.75);
      font-size: 13px; font-style: italic; margin-bottom: 22px; line-height: 1.65;
    }
    .post-body .update-note::before { content: '✎  '; opacity: 0.7; }

    /* Tags */
    .post-tags {
      margin-top: 44px; padding-top: 28px;
      border-top: 1px solid rgba(167,139,250,0.10);
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    .post-tags-label {
      font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(200,195,235,0.32); margin-right: 4px;
    }
    .post-tag {
      font-size: 11.5px; letter-spacing: 0.05em;
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid rgba(167,139,250,0.20);
      background: rgba(167,139,250,0.05);
      color: rgba(200,195,235,0.58);
      transition: border-color 160ms ease, color 160ms ease, background 160ms ease;
    }
    .post-tag:hover {
      border-color: rgba(167,139,250,0.40); color: rgba(200,195,235,0.85);
      background: rgba(167,139,250,0.10);
    }

    /* Gallery CTA */
    .post-cta {
      margin-top: 40px; padding: 24px 28px; border-radius: 16px;
      border: 1px solid rgba(167,139,250,0.16);
      background: rgba(167,139,250,0.04);
      display: flex; align-items: center;
      justify-content: space-between; gap: 20px; flex-wrap: wrap;
    }
    .post-cta-text { font-size: 13.5px; color: rgba(200,195,235,0.68); line-height: 1.5; }
    .post-cta-text strong { display: block; font-size: 15px; color: rgba(200,195,235,0.90); margin-bottom: 3px; }
    .post-cta-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600;
      color: rgba(167,139,250,0.90);
      border: 1px solid rgba(167,139,250,0.30);
      background: rgba(167,139,250,0.08);
      border-radius: 999px; padding: 0 18px 0 14px; height: 40px;
      text-decoration: none; cursor: pointer; white-space: nowrap;
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
    }
    .post-cta-btn:hover {
      background: rgba(167,139,250,0.16); border-color: rgba(167,139,250,0.55); color: #a78bfa;
    }

    body.post-open #siteHeader { opacity: 0.4; pointer-events: none; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .blog-featured { grid-template-columns: 1fr; min-height: auto; }
      .blog-featured-img { min-height: 200px; }
      .blog-featured-img-wrap { height: 200px; }
      .blog-featured-body { padding: 24px 20px; border-left: none; border-top: 1px solid rgba(167,139,250,0.10); }
      .blog-row { grid-template-columns: 120px 1fr; min-height: 100px; }
      .blog-row-body { padding: 14px 16px; }
      .blog-row-intro { display: none; }
      .post-banner { height: 45vh; }
      .post-banner-text { padding: 24px 20px 28px; }
      .post-article { padding: 36px 20px 60px; }
      .post-intro { font-size: 15px; }
      .post-cta { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 420px) {
      .blog-row { grid-template-columns: 90px 1fr; }
    }

  </style>
</head>
<body class="page-blog">

<div id="siteHeader"></div>

<main>
  <section class="section">
    <div class="wrap">

      <div class="section-head">
        <h2>Blog</h2>
        <p class="blog-subhead">Write-ups on the objects in the gallery — what they are, why they're worth imaging, and the story behind each capture.</p>
      </div>

      <!-- Filter pills -->
      <div class="blog-filters" role="group" aria-label="Filter posts by type" id="blogFilters">
        <button class="filter-pill active" data-filter="all"           type="button" aria-pressed="true">All</button>
        <button class="filter-pill"         data-filter="nebulae"       type="button" aria-pressed="false">Nebulae</button>
        <button class="filter-pill"         data-filter="galaxies"      type="button" aria-pressed="false">Galaxies</button>
        <button class="filter-pill"         data-filter="star-clusters" type="button" aria-pressed="false">Star Clusters</button>
        <button class="filter-pill"         data-filter="star-trails"   type="button" aria-pressed="false">Star Trails</button>
        <button class="filter-pill"         data-filter="comets"        type="button" aria-pressed="false">Comets</button>
        <button class="filter-pill"         data-filter="others"        type="button" aria-pressed="false">Others</button>
      </div>

      <!-- Skeleton placeholders while loading -->
      <div id="blogIndex">
        <div class="blog-skel-featured" aria-hidden="true"></div>
        <div class="blog-skel-row" aria-hidden="true"></div>
        <div class="blog-skel-row" aria-hidden="true"></div>
        <div class="blog-skel-row" aria-hidden="true"></div>
      </div>

    </div>
  </section>
</main>

<div id="siteFooter"></div>


<!-- ─────────────────────────────────
     FULL POST VIEW
───────────────────────────────── -->
<div id="postView" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Blog post">

  <div class="post-banner">
    <img class="post-banner-img" id="postHeroImg" src="" alt="" />
    <button class="post-back" id="postBack" aria-label="Back to blog">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Blog
    </button>
    <div class="post-banner-text">
      <div class="post-type-label" id="postType"></div>
      <h1 class="post-title" id="postTitle"></h1>
    </div>
  </div>

  <div class="post-article">
    <p class="post-intro" id="postIntro"></p>
    <div class="post-body"  id="postBody"></div>

    <div class="post-tags" id="postTags">
      <span class="post-tags-label">Tags</span>
    </div>

    <div class="post-cta">
      <div class="post-cta-text">
        <strong>See it in the gallery</strong>
        View the full image and navigate through the rest of the collection.
      </div>
      <a class="post-cta-btn" href="gallery.html" id="postGalleryLink">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <rect x="0" y="0" width="6" height="6" rx="1" fill="currentColor"/>
          <rect x="8" y="0" width="6" height="6" rx="1" fill="currentColor"/>
          <rect x="0" y="8" width="6" height="6" rx="1" fill="currentColor"/>
          <rect x="8" y="8" width="6" height="6" rx="1" fill="currentColor"/>
        </svg>
        Open Gallery
      </a>
    </div>
  </div>

</div>


<script>
(function () {
  'use strict';

  const blogIndex = document.getElementById('blogIndex');
  const postView  = document.getElementById('postView');
  const postBack  = document.getElementById('postBack');
  const filters   = document.getElementById('blogFilters');

  const postType    = document.getElementById('postType');
  const postTitle   = document.getElementById('postTitle');
  const postHeroImg = document.getElementById('postHeroImg');
  const postIntro   = document.getElementById('postIntro');
  const postBody    = document.getElementById('postBody');
  const postTags    = document.getElementById('postTags');

  let posts = [];
  let activeFilter = 'all';

  const TYPE_LABELS = {
    nebulae:        'Nebulae',
    galaxies:       'Galaxies',
    'star-clusters':'Star Clusters',
    'star-trails':  'Star Trails',
    comets:         'Comets',
    others:         'Others',
  };

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function bodyToHtml(text) {
    return text.split('\n\n').map(para => {
      para = para.trim();
      if (!para) return '';
      if (/^\[UPDATE/.test(para)) {
        const inner = para.replace(/^\[|\]$/g, '').trim();
        return `<div class="update-note">${esc(inner)}</div>`;
      }
      return `<p>${esc(para)}</p>`;
    }).join('');
  }

  function heroImg(post) {
    if (post.file)                         return post.file;
    if (post.images && post.images.length) return post.images[0].file;
    if (post.videos && post.videos.length) return post.videos[0].poster;
    return '';
  }

  function render() {
    const visible = activeFilter === 'all'
      ? posts
      : posts.filter(p => p.type === activeFilter);

    if (!visible.length) {
      blogIndex.innerHTML = `<p class="blog-empty">No posts in this category yet.</p>`;
      return;
    }

    const [featured, ...rest] = visible;

    const featuredHtml = `
      <div class="blog-featured reveal" data-slug="${esc(featured.slug)}"
           role="article" tabindex="0" aria-label="${esc(featured.title)}">
        <div class="blog-featured-img-wrap">
          <img class="blog-featured-img"
               src="${esc(heroImg(featured))}" alt="${esc(featured.title)}"
               loading="eager" decoding="async" />
        </div>
        <div class="blog-featured-body">
          <div class="blog-featured-type">${esc(TYPE_LABELS[featured.type] || featured.type)}</div>
          <div class="blog-featured-title">${esc(featured.title)}</div>
          <div class="blog-featured-intro">${esc(featured.intro)}</div>
          <div class="blog-featured-read">
            Read more
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M3 7h8M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="blog-featured-date">${esc(featured.date)}</div>
        </div>
      </div>`;

    const listHtml = rest.length ? `
      <div class="blog-list">
        ${rest.map((post, i) => `
          <div class="blog-row reveal" data-slug="${esc(post.slug)}"
               role="article" tabindex="0" aria-label="${esc(post.title)}">
            <div class="blog-row-img-wrap">
              <img class="blog-row-img"
                   src="${esc(heroImg(post))}" alt="${esc(post.title)}"
                   loading="${i < 4 ? 'eager' : 'lazy'}" decoding="async" />
            </div>
            <div class="blog-row-body">
              <div class="blog-row-type">${esc(TYPE_LABELS[post.type] || post.type)}</div>
              <div class="blog-row-title">${esc(post.title)}</div>
              <div class="blog-row-intro">${esc(post.intro)}</div>
              <div class="blog-row-meta">${esc(post.date)}</div>
            </div>
          </div>`).join('')}
      </div>` : '';

    blogIndex.innerHTML = featuredHtml + listHtml;

    requestAnimationFrame(() => {
      blogIndex.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('in'), i * 50);
      });
    });

    blogIndex.querySelectorAll('[data-slug]').forEach(el => {
      el.addEventListener('click',   ()  => openPost(el.dataset.slug));
      el.addEventListener('keydown', e   => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPost(el.dataset.slug); }
      });
    });
  }

  function openPost(slug) {
    const post = posts.find(p => p.slug === slug);
    if (!post) return;

    postType.textContent  = TYPE_LABELS[post.type] || post.type;
    postTitle.textContent = post.title;
    postHeroImg.src       = heroImg(post);
    postHeroImg.alt       = post.title;
    postIntro.textContent = post.intro;
    postBody.innerHTML    = bodyToHtml(post.body);

    postTags.innerHTML = `<span class="post-tags-label">Tags</span>` +
      (post.tags || []).map(t => `<span class="post-tag">${esc(t)}</span>`).join('');

    postView.classList.add('open');
    postView.setAttribute('aria-hidden', 'false');
    document.body.classList.add('post-open');
    postView.scrollTop = 0;
    postBack.focus();
    history.pushState({ slug }, '', `#${slug}`);
  }

  function closePost() {
    postView.classList.remove('open');
    postView.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('post-open');
    history.pushState(null, '', window.location.pathname);
  }

  function setFilter(filter) {
    activeFilter = filter;
    filters.querySelectorAll('.filter-pill').forEach(btn => {
      const on = btn.dataset.filter === filter;
      btn.classList.toggle('active', on);
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    render();
  }

  async function loadData() {
    try {
      const res = await fetch('site-data.json');
      if (!res.ok) throw new Error(res.status);
      posts = await res.json();
      render();
      const hash = window.location.hash.replace('#', '');
      if (hash && posts.find(p => p.slug === hash)) openPost(hash);
    } catch (err) {
      console.error('Failed to load blog data', err);
      blogIndex.innerHTML = '<p class="blog-empty">Could not load posts — please try again.</p>';
    }
  }

  filters.addEventListener('click', e => {
    const pill = e.target.closest('.filter-pill');
    if (pill) setFilter(pill.dataset.filter);
  });

  postBack.addEventListener('click', closePost);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && postView.classList.contains('open')) closePost();
  });

  window.addEventListener('popstate', () => {
    if (postView.classList.contains('open')) {
      postView.classList.remove('open');
      postView.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('post-open');
    }
  });

  loadData();

})();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {

      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
